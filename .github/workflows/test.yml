name: Lexum Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Checkout lexum-compiler
        run: git clone https://github.com/lexumlang/lexum-compiler.git ../lexum-compiler

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --all
