name: Ved Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Checkout ved-compiler
        run: git clone https://github.com/vedlanghq/ved-compiler.git ../ved-compiler

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --all
